<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Coin Tracker</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <h1>Crypto Market Data</h1>

  <div class="controls">
    <input type="text" id="searchInput" placeholder="Search by name or symbol" />
    <button onclick="searchCoin()">Search</button>
    <button onclick="sortByMarketCap()">Sort by Market Cap</button>
    <button onclick="sortByPercentage()">Sort by % Change</button>
  </div>

  <table>
    <thead>
      <tr>
        <th>Image</th>
        <th>Name</th>
        <th>Symbol</th>
        <th>Current Price ($)</th>
        <th>Total Volume</th>
        <th>Market Cap</th>
        <th>24h % Change</th>
      </tr>
    </thead>
    <tbody id="tableBody">
      <!-- Data will load here -->
    </tbody>
  </table>

  <script src="script.js"></script>
</body>
</html>
