<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rawabi Restaurant</title>
  <link rel="stylesheet" href="style.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
</head>
<body>

  <header>
    <h1>Rawabi Restaurant</h1>
    <p>Fresh & Delicious Food</p>
  </header>

  <section id="menu-section">
    <h2>Menu</h2>
    <div id="menu-items"></div>
    <button id="order-btn">Take Order</button>
  </section>

  <section id="table-section">
    <h2>Table No. 1</h2>
    <p id="order-details">Your order is being prepared...</p>
    <p id="status">Order Status: Preparing</p>
  </section>

  <div id="thank-you">Thank You!</div>

  <script src="script.js"></script>
</body>
</html>
